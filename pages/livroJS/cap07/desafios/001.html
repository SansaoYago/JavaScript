<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste</title>
</head>
<body>
    <h1>Sobrenome</h1>
    <form>
        <label for="inNome">
            Nome Completo: <input type="text" name="inNome" id="inNome" value="Cristian Sansão Yago Bezerra">
        </label>
        <input type="submit" value="Registrar">
    </form>
    <h3></h3>
    <script>
        const form = document.querySelector('form')
        const out = document.querySelector('h3')

        form.addEventListener("submit", (e) => {
            e.preventDefault()

            const nome = form.inNome.value
            const partes = nome.split(" ")
            console.log(partes);
            
            let email = `${partes[0].charAt(0)}.${partes[partes.length - 1]}@email.com`.toLowerCase()
            out.textContent = email
        })
    </script>
</body>
</html>
