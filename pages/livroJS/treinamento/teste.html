<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste</title>
</head>
<body>
    <h1>Inverter nomes</h1>
    <form>
        <label for="inNome">
            Nome: <input type="text" name="inNome" id="inNome" autofocus>
        </label>
        <input type="submit" value="Inverter">
    </form>
    <h3></h3>
    <script>
        const form = document.querySelector("form")
        const resp = document.querySelector("h3")

        form.addEventListener("submit", (e) => {
            e.preventDefault()

            const nome = form.inNome.value
            const tam = nome.length

            let nomeInv = nome.charAt(tam - 1).toUpperCase()

            for (const letra of nome) {
                nomeInv += letra.charAt(nome.length - 2)
            }

            resp.textContent = nomeInv
        })
    </script>
</body>
</html>
