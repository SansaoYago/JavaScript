<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex4_c</title>
</head>
<body>
    <h1>Programa Parquímetro</h1>
    <form>
        <label for="inValor">
            Valor R$: <input type="number" name="inValor" id="inValor" step="0.01">
        </label>
        <br>
        <input type="submit" value="Confirmar Depósito">
    </form>
    <h3></h3>
    <h4></h4>
    <script>
        const form = document.querySelector("form")
        const out = document.querySelector("h3")
        const Troco = document.querySelector("h4")

        form.addEventListener("submit", (e) => {
            e.preventDefault()

            const deposito = Number(form.inValor.value)
            let troco = 0
            let tempo = ""

            if (deposito >= 1 && deposito < 1.75) {
                tempo += "30 min"
                troco = deposito - 1
            } else if (deposito >= 1.75 && deposito < 3) {
                tempo += "60 min"
                troco = deposito - 1.75
            } else {
                tempo += "120 min"
                troco = deposito - 3
            }

            out.textContent = `Tempo: ${tempo}`
            console.log(troco)

            if (troco > 0) {
                Troco.textContent = `Troco: ${troco.toLocaleString("pt-br", {style: "currency", currency: "BRL"})}`
            } else {
                Troco.textContent = ""
            }

        })
    </script>
</body>
</html>
