<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex4_a</title>
</head>
<body>
    <h1>Programa Par ou Ímpar</h1>
    <form>
        <label for="inNumero">
            Número: <input type="number" name="inNumero" id="inNumero">
        </label>
        <br>
        <input type="submit" value="Verificar se é Par ou Impar">
    </form>
    <h3></h3>
    <script>
        const form = document.querySelector("form")
        const out = document.querySelector("h3")

        form.addEventListener("submit", (e) => {
            e.preventDefault()

            const numero = Number(form.inNumero.value)

            if (numero % 2 == 0) {
                out.textContent = `${numero} é Par`
            } else {
                out.textContent = `${numero} é Impar`
            }
        })
    </script>
</body>
</html>
