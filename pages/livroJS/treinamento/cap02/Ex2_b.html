<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex2_b</title>
</head>
<body>
    <h1>Lan House JS</h1>
    <form>
        <label for="inValor">
            Valor por 15 minutos de uso R$:
            <input type="number" name="inValor" id="inValor">
        </label> <br>
        <label for="inTempo">
            Tempo de Uso do Cliente:
            <input type="number" name="inTempo" id="inTempo">
        </label>
        <input type="submit" value="Calcular Valor a Pagar">
    </form>
    <h3></h3>
    <script>
        const form = document.querySelector("form")
        const out = document.querySelector("h3")

        form.addEventListener("submit", (e) => {
            e.preventDefault()

            const valor = Number(form.inValor.value)
            const tempo = Number(form.inTempo.value)

            const tempoInt = Math.ceil(tempo / 15)
            const total = valor * tempoInt

            out.textContent = `Valor a pagar ${total.toLocaleString("pt-br", {style: "currency", currency: "BRL"})}`
            form.reset()
            form.inValor.focus()
        })
    </script>
</body>
</html>
